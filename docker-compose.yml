name: quantflow-api
version: '3.8'

services:
  app:
    container_name: Quantflow-API
    image: dunglas/frankenphp:php8.3-alpine
    restart: unless-stopped
    ports:
      - "8000:8000"
    environment:
      - APP_ENV=local
      - APP_DEBUG=true
      - APP_URL=http://localhost:8000
      - DB_CONNECTION=sqlite
      - QUEUE_CONNECTION=redis
      - REDIS_HOST=redis
      - REDIS_PORT=6379
      - SERVER_NAME=:8000
    volumes:
      - .:/app
    depends_on:
      - redis
    command: php artisan serve --host=0.0.0.0 --port=8000

  queue:
    image: dunglas/frankenphp:php8.3-alpine
    restart: unless-stopped
    environment:
      - APP_ENV=local
      - APP_DEBUG=true
      - DB_CONNECTION=sqlite
      - QUEUE_CONNECTION=redis
      - REDIS_HOST=redis
      - REDIS_PORT=6379
    volumes:
      - .:/app
    depends_on:
      - redis
    command: sh -c "php artisan queue:work redis --queue=batches --tries=3 --timeout=120 & php artisan queue:work redis --queue=notifications --tries=5"

  redis:
    image: redis:alpine
    restart: unless-stopped
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data

volumes:
  redis_data:
